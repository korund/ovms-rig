# Per-machine overrides. Copy to machine.yaml and edit; machine.yaml is gitignored.
# Anything omitted here falls back to defaults or PATH lookup.

runtime:
  # Absolute path to the ovms binary. If omitted, the loader looks at PATH.
  ovms_path: null
  # Where to keep the OpenVINO compile cache (--cache_dir).
  cache_dir: null

models:
  # Where the loader should place fetched HF models. Required: every stage
  # (fetch, apply, start) needs a concrete path, so the schema rejects local
  # configs without it. Set this to the absolute path of your model store
  # before running the tool, e.g.:
  #   repository_path: C:/ovms/models
