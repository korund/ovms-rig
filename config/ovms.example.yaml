# Declarative deployment for OpenVINO Model Server.
# Single source of truth for what the loader brings up.
# Machine-specific values (paths, ports) live in local.yaml; see local.example.yaml.
#
# Shape mirrors the OVMS domain:
#   - `repository` : identities (HF reference + revision), declared once
#   - `models`     : HTTP endpoints, each backed by a source model and a bag of LLMCalculator
#                    fields. Keys are endpoint names; values reference into `repository` via .source.
# Speculative decoding is not a special pipeline mode here -- it emerges when a
# model entry's `graph` contains `draft_model`. Drop that field and the same
# tool produces a plain single-model setup, no special-casing.

runtime:
  rest_port: 8000
  log_level: INFO   # TRACE | DEBUG | INFO | WARNING | ERROR

repository:
  qwen3-14b:
    hf: OpenVINO/Qwen3-14B-int8-ov
    task: text_generation
  qwen3-0.6b:
    hf: OpenVINO/Qwen3-0.6B-int8-ov
    task: text_generation
  # Plain (non-task) models: detection, classification, or other ONNX/OpenVINO IR models.
  # These are registered via model_config_list, not mediapipe graphs.
  # No task field; rig does not fetch them (user places files in store manually).
  # mobilenet-v2:
  #   hf: some/mobilenet-v2
  #   # task is omitted/None -> plain model

# Profiles group model endpoints into sets that can be brought up together.
# At most one profile may have `active: true`; that profile's models end up in
# config.json after `rig activate`. Endpoints outside every profile stay defined
# but never load. `rig deactivate` clears the active flag (empty live config).
profiles:
  default:
    models: [qwen3-spec]
    active: true

models:
  qwen3-spec:
    source: qwen3-14b
    # Deployment knobs shared by every model type, set on the entry itself.
    device: GPU
    # OpenVINO device properties forwarded to the device plugin. ovms 2026.1
    # does not propagate the global --cache_dir to the LLM continuous-batch
    # pipeline, so CACHE_DIR must travel via plugin_config. The loader
    # injects local.runtime.cache_dir here automatically unless you set
    # CACHE_DIR explicitly below. Forward slashes are required.
    plugin_config:
      KV_CACHE_PRECISION: u8
    #   CACHE_DIR: C:/ovms/cache
    #   PERFORMANCE_HINT: LATENCY
    graph:
      # Fields written into LLMCalculatorOptions in graph.pbtxt.
      # The loader treats this section as a typed pass-through bag; it does not
      # know what speculative decoding means, only how to set fields.
      max_num_seqs: 256
      enable_prefix_caching: true
      cache_size: 0           # GB; 0 = dynamic
      dynamic_split_fuse: true
      # draft_model: qwen3-0.6b
      # draft_device: CPU
    # Overrides for generation_config.json (HuggingFace generation config).
    # Keys and values are passed through as-is; no schema validation.
    # generation:
    #   temperature: 0.5
    #   top_p: 0.95
    #   num_speculative_tokens: 7

  # Plain (non-task) model example: detection/classification/etc. registered via model_config_list.
  # mobilenet:
  #   source: mobilenet-v2
  #   device: CPU
  #   # plain: model_config_list options (batch_size, nireq, model_version_policy, etc.)
  #   plain:
  #     batch_size: 4
  #     nireq: 8
